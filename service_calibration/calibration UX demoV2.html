<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>左侧树形与右侧图</title>
<style>
    /* 全局重置与背景 */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #b5c9c6;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        box-sizing: border-box;
    }

    /* --- 核心两栏布局 --- */
    #main-layout {
        display: flex;
        flex-direction: row;
        gap: 20px;
        width: 100%;
        max-width: 1400px;
        height: auto;
        align-items: stretch; /* 强制左右两栏高度严格对齐 */
    }

    /* --- 左侧列：树形菜单 + 图1控制面板 --- */
    #left-column {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 450px; /* 固定宽度 */
        flex-shrink: 0;
    }

    /* --- 树形菜单区域 --- */
    #tree-container {
        background-color: #fff;
        border: 1px solid #8e9b9a;
        width: 100%;
        padding: 5px 0;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        height: 490px; 
        overflow-y: auto; /* 内容溢出时显示垂直滚动条 */
        box-sizing: border-box;
    }

    /* 树形结构样式 */
    ul { list-style-type: none; padding-left: 0; margin: 0; }
    li { padding: 0; margin: 0; }
    .node-content {
        display: flex; justify-content: flex-start; align-items: center;
        padding: 4px 10px; cursor: pointer; user-select: none;
        font-size: 14px; color: #222;
    }
    .node-content:hover { background-color: #eaf2f1; }
    .children-wrap { padding-left: 24px; }
    .toggle-btn {
        display: flex; justify-content: center; align-items: center;
        width: 16px; height: 16px; border: 1px solid #999;
        background-color: #fff; margin-right: 6px; font-size: 12px;
        color: #333; cursor: pointer;
    }
    .toggle-placeholder { width: 16px; margin-right: 6px; }
    .node-content input[type="checkbox"] {
        margin: 0; margin-left: auto; cursor: pointer; width: 16px; height: 16px;
    }
    .collapsed .children-wrap { display: none; }
    
    /* 自定义滚动条样式 */
    #tree-container::-webkit-scrollbar { width: 8px; }
    #tree-container::-webkit-scrollbar-track { background: #f1f1f1; }
    #tree-container::-webkit-scrollbar-thumb { background: #c1c1c1; }
    #tree-container::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

    /* --- 图1 控制面板 --- */
    #control-panel {
        width: 100%;
        background-color: #b7cdcb;
        border: 1px solid #9fb4b2;
        padding: 15px 20px;
        box-sizing: border-box;
        display: flex; flex-direction: column; justify-content: space-between;
        border-radius: 2px;
        aspect-ratio: 1 / 0.65;
    }

    .ctrl-position-area { display: flex; align-items: flex-end; margin-bottom: 5px; }
    .ctrl-label { font-size: 24px; color: #3e4e4d; margin-right: auto; padding-bottom: 3px; font-weight: 400; }
    .ctrl-col { display: flex; flex-direction: column; align-items: center; margin-left: 20px; }
    .ctrl-col-title { font-size: 11px; color: #3a4e4c; margin-bottom: 2px; }
    .ctrl-input-group { display: flex; align-items: center; border: 1px solid #4d5a58; background: #fff; padding: 0 4px; }
    .ctrl-input-group input { border: none; outline: none; width: 45px; text-align: center; font-size: 14px; padding: 4px 0; background: transparent; color: #111; }
    .ctrl-unit { font-size: 11px; color: #3a4e4c; padding-left: 2px; }

    .ctrl-guide-box {
        border: 1px solid #a4b5b3;
        background-color: #cfe0de;
        padding: 10px 15px;
        flex-grow: 1; 
        display: flex; flex-direction: column;
        justify-content: center; 
    }
    .ctrl-guide-header { display: flex; align-items: center; margin-bottom: 8px; }
    .icon-box { background-color: #e68d1e; color: #fff; font-weight: bold; font-size: 12px; padding: 2px 5px; margin-right: 8px; display: inline-block; line-height: 1.2; font-family: monospace; }
    .ctrl-guide-title { font-size: 16px; color: #4f6866; font-weight: 500; }
    .ctrl-guide-content { color: #5a7170; font-size: 14px; line-height: 1.5; margin: 0; }

    .ctrl-buttons { display: flex; justify-content: space-between; gap: 8px; margin-top: 10px; }
    .ctrl-btn { padding: 6px 0; width: 22%; font-size: 14px; font-weight: bold; text-align: center; border: 2px solid transparent; cursor: default; }
    .btn-start { background-color: #fff; border-color: #333; color: #000; }
    .btn-disabled { background-color: #d8e2e0; border-color: #c8d5d3; color: #abb9b7; cursor: not-allowed; }

    /* --- 右侧列：图2 区域 --- */
    #right-column {
        flex: 1;
        background-color: #b7cdcb;
        border: 1px solid #9fb4b2;
        padding: 5px;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    #right-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }
</style>
</head>
<body>

<div id="main-layout">
    <!-- 左侧列 -->
    <div id="left-column">
        <!-- 树形菜单 -->
        <div id="tree-container"></div>

        <!-- 图1控制面板 -->
        <div id="control-panel">
            <div class="ctrl-position-area">
                <div class="ctrl-label">Position</div>
                <div class="ctrl-col">
                    <span class="ctrl-col-title">Primary</span>
                    <div class="ctrl-input-group">
                        <input type="text" value="0.000" readonly><span class="ctrl-unit">cm</span>
                    </div>
                </div>
                <div class="ctrl-col">
                    <span class="ctrl-col-title">Secondary</span>
                    <div class="ctrl-input-group">
                        <input type="text" value="0.000" readonly><span class="ctrl-unit">cm</span>
                    </div>
                </div>
            </div>

            <div class="ctrl-guide-box">
                <div class="ctrl-guide-header">
                    <span class="icon-box">i≡</span>
                    <span class="ctrl-guide-title">User Guide</span>
                </div>
                <p class="ctrl-guide-content">
                    please click'Start' button to active calibration mode for lateral axis.
                </p>
            </div>

            <div class="ctrl-buttons">
                <button class="ctrl-btn btn-start">START</button>
                <button class="ctrl-btn btn-disabled">PREV</button>
                <button class="ctrl-btn btn-disabled">NEXT</button>
                <button class="ctrl-btn btn-disabled">ABORT</button>
            </div>
        </div>
    </div>

    <!-- 右侧列 -->
    <div id="right-column">
        <img id="right-img" src="https://placehold.co/900x650/b7cdcb/1f3432?text=请替换为图2的本地图片" alt="图2诊断与控制面板">
    </div>
</div>

<script>
    // --- 树形菜单数据（已将 PITCH 和 ROLL 移动到列表前两位） ---
    const treeData = [{
        label: "6DPPS Setup",
        expanded: true,
        children: [
            {
                label: "Field",
                expanded: true,
                children: [
                    { label: "LATERAL axis calibration" },
                    { label: "LONGITUDINAL axis calibration" },
                    { label: "VERTICAL axis calibration" },
                    { label: "INCLINOMETER axis calibration" },
                    { label: "PITCH axis calibration" },
                    { label: "ROLL axis calibration" },
                    { label: "ISOCENTRIC axis calibration" },
                    { label: "COLUMN axis calibration" }
                ]
            },
            {
                label: "Setting to work (STW)",
                expanded: true,
                // 将 PITCH 和 ROLL 移动到数组最前面（第 1 和第 2 位）
                children: [
                    { 
                        label: "PITCH axis calibration", 
                        expanded: true,
                        children: [
                            { label: "INCLINOMETER axis calibration" },
                            { label: "PITCH axis calibration" } 
                        ]
                    },
                    { 
                        label: "ROLL axis calibration", 
                        expanded: true,
                        children: [
                            { label: "INCLINOMETER axis calibration" },
                            { label: "ROLL axis calibration" } 
                        ]
                    },
                    { label: "LATERAL axis calibration" },
                    { label: "LONGITUDINAL axis calibration" },
                    { label: "VERTICAL axis calibration" },
                    { label: "INCLINOMETER axis calibration" },
                    { label: "ISOCENTRIC axis calibration" },
                    { label: "COLUMN axis calibration" }
                ]
            }
        ]
    }];

    function renderTree(data, container) {
        const ul = document.createElement('ul');
        data.forEach(node => {
            const li = document.createElement('li');
            const contentDiv = document.createElement('div');
            contentDiv.className = 'node-content';
            const hasChildren = node.children && node.children.length > 0;

            if (hasChildren) {
                const toggleBtn = document.createElement('span');
                toggleBtn.className = 'toggle-btn';
                toggleBtn.textContent = node.expanded ? '−' : '+';
                contentDiv.appendChild(toggleBtn);
            } else {
                const placeholder = document.createElement('span');
                placeholder.className = 'toggle-placeholder';
                contentDiv.appendChild(placeholder);
            }

            const labelSpan = document.createElement('span');
            labelSpan.textContent = node.label;
            contentDiv.appendChild(labelSpan);

            if (!hasChildren) {
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = false; 
                contentDiv.appendChild(checkbox);
            }

            li.appendChild(contentDiv);

            if (hasChildren) {
                const childWrap = document.createElement('div');
                childWrap.className = 'children-wrap';
                if (!node.expanded) li.classList.add('collapsed');
                renderTree(node.children, childWrap);
                li.appendChild(childWrap);

                contentDiv.addEventListener('click', function(e) {
                    if (e.target.tagName === 'INPUT') return;
                    li.classList.toggle('collapsed');
                    const isCollapsed = li.classList.contains('collapsed');
                    toggleBtn.textContent = isCollapsed ? '+' : '−';
                });
            }
            ul.appendChild(li);
        });
        container.appendChild(ul);
    }

    const container = document.getElementById('tree-container');
    renderTree(treeData, container);
</script>

</body>
</html>
